overview: |
  Frontend engineer specializing in design systems and the developer experience that makes them last. I build component libraries, web components, and build tooling that close the gap between design and engineering teams. At Alaska Airlines, I cut release cycle time by 80% across 20+ repositories. At E*TRADE, I reduced full-day deploys to under 3 hours. React, Vue, Svelte, accessibility, and CI/CD automation across 10+ years of responsive web development.