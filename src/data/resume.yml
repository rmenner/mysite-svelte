overview: |
  Frontend engineer who builds interfaces that feel obvious to use. I specialize in component architecture, CSS that scales, and accessibility. At E*TRADE, I was part of the team building accessible web components for data-dense financial interfaces and built a React sandbox that let non-technical stakeholders prototype with the full design system. At Alaska Airlines, I automated a manual, repo-by-repo release process across 20+ repositories. 10+ years across React, Vue, Svelte, and CSS.